# SonarCloud (SonarQube Cloud) configuration for wigle-to-wdgwars.
#
# Setup once, then the GitHub Actions ci-quality-gates workflow uses it:
#   1. Sign in to https://sonarcloud.io (EU region) with the GitHub account
#      and import this repo. SonarQube Cloud is free for public repositories.
#   2. SonarCloud shows the organization key and project key it assigned.
#      Confirm the two values below match what it shows (the defaults below
#      are SonarCloud's usual convention for a GitHub-imported repo).
#   3. In SonarCloud project settings, disable "Automatic Analysis" so the
#      CI-based scanner is the source of truth.
#   4. Generate a token (My Account > Security) and add it to the GitHub
#      repo as the SONAR_TOKEN Actions secret.

sonar.organization=yggdrasil-ai-labs
sonar.projectKey=Yggdrasil-AI-labs_wigle-to-wdgwars
sonar.projectName=wigle-to-wdgwars

# Analysed application code. wigle_to_wdgwars.py is the whole CLI.
sonar.sources=wigle_to_wdgwars.py
sonar.tests=tests

# Python versions the code targets (matches the CI test matrix).
sonar.python.version=3.10,3.11,3.12

# Coverage report produced by pytest-cov (--cov-report=xml).
sonar.python.coverage.reportPaths=coverage.xml

# Keep shell helpers out of analysis so the quality gate judges real source.
sonar.exclusions=scripts/**

# Accept-by-design taint rules for an operator-run CLI (2026-07-18).
#
# The pythonsecurity taint rules (S8707 file-path taint from argv, and
# siblings) model the operator's own CLI arguments as attacker input. For
# this tool the operator's argv is not a privilege boundary: whoever runs
# `wigle_to_wdgwars.py <file>` already has the shell. See
# SECURITY-FINDINGS.md for the per-class review (2026-06-21) — nothing to
# remediate; resolve()/normalisation deliberately does not clear taint.
#
# These were previously handled by marking issues "Accepted" in the
# SonarCloud UI, but UI dispositions are keyed to issue-tracking matches
# and silently reset when the file changes shape (bit us 2026-07-18: a
# routine edit re-raised them and hard-failed the gate). An in-repo,
# code-reviewed ignore cannot regress that way.
sonar.issue.ignore.multicriteria=taint1
sonar.issue.ignore.multicriteria.taint1.ruleKey=pythonsecurity:S8707
sonar.issue.ignore.multicriteria.taint1.resourceKey=wigle_to_wdgwars.py

# Make the CI scanner block on the quality gate: the scan step returns a
# non-zero exit code (failing the job) if the gate fails, instead of only
# reporting it on the dashboard. This is what turns the gate into a hard gate.
sonar.qualitygate.wait=true
